<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Tax-Ready Invoice</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gradient-to-br from-indigo-950 via-indigo-900 to-slate-900 flex items-center justify-center">

<div class="w-full max-w-sm mx-auto px-4">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">📄</div>
    <h1 class="text-white text-2xl font-bold">Tax-Ready Invoice</h1>
    <p class="text-indigo-300 text-sm mt-1">Free for freelancers</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <h2 class="text-xl font-bold text-slate-800 mb-6">Create your account</h2>

    {% if error %}
    <div class="mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
      <i class="fas fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/register" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="email">Email address</label>
        <input id="email" name="email" type="email" required autocomplete="email"
               class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="you@example.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required
               class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="At least 8 characters" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" required
               class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="Repeat your password" />
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 mt-6">
      Already have an account?
      <a href="/login" class="text-indigo-600 hover:underline font-medium">Sign in</a>
    </p>
  </div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</body>
</html>
