<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Invocto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    .glow { background:
      radial-gradient(60rem 40rem at 20% -10%, rgba(99,102,241,.28), transparent 60%),
      radial-gradient(50rem 40rem at 90% 110%, rgba(168,85,247,.22), transparent 60%),
      #070912; }
    .logo-mark { background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 55%,#a855f7 100%); box-shadow:0 10px 30px -6px rgba(99,102,241,.6); }
    .finput { width:100%; border:1px solid #e2e8f0; border-radius:.7rem; padding:.7rem .9rem; font-size:.9rem; outline:none; transition:box-shadow .15s,border-color .15s; }
    .finput:focus { box-shadow:0 0 0 3px rgba(129,140,248,.35); border-color:#818cf8; }
  </style>
</head>
<body class="h-full glow flex items-center justify-center p-4">

<div class="w-full max-w-sm">

  <!-- Brand -->
  <div class="flex flex-col items-center mb-7">
    <div class="logo-mark w-14 h-14 rounded-2xl flex items-center justify-center mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 2.5h8.2L20 7.8V19.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-15a2 2 0 0 1 2-2Z" fill="white" fill-opacity="0.95"/>
        <path d="M7.6 9.6h7M7.6 12.5h7M7.6 15.4h4.2" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="text-white text-2xl font-extrabold tracking-tight">Invocto</h1>
    <p class="text-indigo-300/70 text-sm mt-1">Free invoicing &amp; e-invoicing for freelancers</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl shadow-black/40 p-7">
    <h2 class="text-lg font-bold text-slate-800 mb-1">Welcome back</h2>
    <p class="text-sm text-slate-400 mb-5">Sign in to your workspace.</p>

    {% if error %}
    <div class="mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
      <i class="fas fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-3.5">
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5" for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email"
               class="finput" placeholder="you@example.com" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5" for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"
               class="finput" placeholder="••••••••" />
      </div>
      <button type="submit"
              class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold rounded-xl px-4 py-2.5 text-sm transition-all shadow-lg shadow-indigo-500/25">
        Sign in
      </button>
    </form>

    <div class="mt-6 pt-5 border-t border-slate-100 text-center">
      <p class="text-sm text-slate-400 mb-3">No account? You don't need one.</p>
      <a href="/start"
         class="flex items-center justify-center gap-2 w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl px-4 py-2.5 text-sm transition-colors">
        <i class="fas fa-bolt text-amber-300"></i> Start instantly — no sign-up
      </a>
    </div>
  </div>

  <p class="text-center text-indigo-300/40 text-xs mt-6">
    An <span class="text-indigo-300/70 font-semibold">Octolabs</span> product · always free
  </p>

</div>

</body>
</html>
