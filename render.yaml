services:
  - type: web
    name: tax-ready-invoice
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    domains:
      - invocto.octolabs.app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Render generates a strong value once and keeps it stable across deploys.
      # Required: the app refuses to boot in production without SECRET_KEY set.
      - key: SECRET_KEY
        generateValue: true
