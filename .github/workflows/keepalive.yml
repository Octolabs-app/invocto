name: Keep-alive

# Prevents the free Supabase project from auto-pausing (it pauses after ~7 days
# with no database activity) and warms the free Render dyno. Runs on GitHub's
# infrastructure — no server required.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}      # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping a DB-backed route
        run: |
          # A valid-format UUID runs a clean SELECT against the database
          # (returns 404, no match) — that activity keeps Supabase awake.
          URL="https://invocto.octolabs.app/invoice/00000000-0000-0000-0000-000000000000"
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "404" ] || [ "$code" = "200" ]; then
              echo "App + database are awake."
              exit 0
            fi
            sleep 30
          done
          echo "App did not respond healthy after retries."
          exit 1
